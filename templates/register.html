{% extends "base.html" %}
{% block title %}Register - Task Tracker{% endblock %}
{% block content %}
<div class="content">
    <div class="center-content">
        <h1>Create Your Account</h1>
        <form method="POST" action="">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="A unique username" required>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" placeholder="E.g., Your Name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="E.g., you@example.com" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Choose a secure password" required>
            <input type="submit" value="Register">
        </form>
        <hr style="border-color: rgba(255,255,255,0.2); margin-top: 20px;">
        <p>Already have an account? <a href="{{ url_for('login') }}">Sign in here</a></p>
    </div>
</div> 
{% endblock %}
