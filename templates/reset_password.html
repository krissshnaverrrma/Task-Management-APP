{% extends "base.html" %}
{% block title %}Set New Password - Task Management APP{% endblock %}
{% block content %}
<div class="content">
    <div class="center-content">
        <h1>Set a New Password</h1>
        <p>Please enter your new password below.</p>
        <form method="POST" action="">
            <label for="password">New Password:</label>
            <input type="password" id="password" name="password" placeholder="Choose a new secure password" required>
            <input type="submit" value="Reset Password">
        </form>
    </div>
</div>
{% endblock %}
