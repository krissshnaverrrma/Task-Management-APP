{% extends "base.html" %}
{% block title %}Login - Task Tracker{% endblock %}
{% block content %}
<div class="content">
    <div class="center-content">
        <h1>Sign in to Your Account</h1>
        <form method="POST" action="">
            <label for="login_identifier">Email or Username:</label>
            <input type="text" id="login_identifier" name="login_identifier" placeholder="Your email or username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Your password" required>
            <input type="submit" value="Sigin">
        </form>
        <hr style="border-color: rgba(255,255,255,0.2); margin-top: 20px;">
        <p style="text-align: right; margin-top: -10px; margin-bottom: 10px;">
            <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
        </p>
        <p>Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
    </div>
</div>
{% endblock %}
